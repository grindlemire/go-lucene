name: CI

on:
    pull_request:
        branches:
            - main

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: checkout repo
              uses: actions/checkout@v4

            - name: setup go
              uses: actions/setup-go@v5
              with:
                  go-version: 'stable'

            - name: test
              run: go test -v ./...

            - name: fuzz test
              run: go test -v ./fuzz
